kind = "mobile"
previewPath = "/"
title = "Phone Helper"
version = "1.0.0"
id = "artifacts/phone-helper"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19249

[services.development]
run = "pnpm --filter @workspace/phone-helper run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/phone-helper", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/phone-helper", "run", "serve" ]

[services.env]
PORT = "19249"
BASE_PATH = "/"
